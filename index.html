<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carta de Amor | Danchi para Nath 🌹</title>
    <link rel="stylesheet" href="./Assets/style.css">
    <link rel="stylesheet" href="./Assets/te-amo.css">
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="Assets/mp4/1_background_rose_smoke.mp4" type="video/mp4">
    </video>
    <div class="overlay-bg"></div>

    <audio id="musicaFondo" loop preload="auto" autoplay>
        <source src="Assets/mp3/1-piano-loop.mpeg" type="audio/mpeg">
    </audio>

    <div class="container" id="appContainer">
        <div id="sobreWrapper" class="sobre-wrapper">
            <div id="sobreAnimado" class="sobre pulso">
                <div class="solapa"></div>
                <div class="sello-estrella" id="selloClick"></div>
            </div>
        </div>
        <div id="cartaContainer" style="width:100%; display: none;"></div>
    </div>

    <script src="scripts/main.js" defer></script>
    <script src="scripts/te-amo.js" defer></script>
</body>
</html>
